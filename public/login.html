<!DOCTYPE html>
<html>
<head>

<title>Employee Management System</title>

<style>

body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:35px;
    border-radius:8px;
    width:320px;
    text-align:center;
    box-shadow:0 0 12px rgba(0,0,0,0.15);
}

h1{
    font-size:22px;
    margin-bottom:5px;
}

h2{
    font-size:18px;
    color:#555;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    padding:10px;
    width:100%;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#0056b3;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>Employee Management System</h1>
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn" onclick="login()">Login</button>

<div class="footer">
Simple HR Management Portal
</div>

</div>

<script>

async function login(){

try{

const btn = document.getElementById("loginBtn");
btn.innerText = "Logging in...";
btn.disabled = true;

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

/* validation */

if(!username || !password){

alert("Please enter username and password");

btn.innerText="Login";
btn.disabled=false;

return;

}

const response = await fetch("/api/users/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username,
password
})

});

const data = await response.json();

if(data.success){

alert("Login successful");

window.location="employee-list.html";

}else{

alert("Invalid username or password");

btn.innerText="Login";
btn.disabled=false;

}

}catch(err){

console.error(err);
alert("Server error");

}

}

/* Enter key login */

document.addEventListener("keypress",function(e){

if(e.key==="Enter"){
login();
}

});

</script>

</body>
</html>
